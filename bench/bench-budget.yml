# SW-010 — Budget-gated benchmark manifest.
#
# Single source of truth for every benchmark budget. Baselines are version-
# stamped: an intentional, justified perf change is made by editing the baseline
# (and budget) here and bumping baseline_version — NO code change is required
# (AC: reviewer-driven baseline re-pinning). The gate fails when a measured
# metric EXCEEDS its budget and reports the delta vs the baseline.
#
# Units: *_ms in milliseconds; binary_size_bytes in bytes. All metrics use the
# "<=" comparator (measured must not exceed budget).
version: 1
# 2026-06-23-v2: re-pinned binary_size for EP-008. ...
# (previous baseline notes preserved)
#
# 2026-07-16-v050-hardening: binary_size_bytes now measures the canonical
# CGo-free release build contract (-trimpath, VCS metadata, fixed version stamp,
# and the 20 registered subset grammar tags) on go1.26.5/linux-amd64/GOAMD64=v1.
# The previous raw `go build` was source-path dependent and had drifted from the
# release command it claimed to measure. The v0.5 hardening work adds bounded
# graph reads plus root/HTTP/MCP security and grows the default binary
# intentionally; package analysis found no new external dependency or accidental
# grammar blob. Baseline 32,509,872 B is the measured canonical current tree;
# budget 34,250,000 B preserves ~5.35% headroom and remains ~15.75 MB below the
# hard 50 MB product ceiling.
baseline_version: "2026-07-16-v050-hardening-go1.26.5-linux-amd64-release"
fixture_digest: "50f9966c5b0ef60515a94f2015326ce07fa034f3b63128e8444335bf236c57f4"

