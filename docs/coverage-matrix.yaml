# graphi — capability coverage matrix (structured source of truth)
#
# This file is the SINGLE SOURCE the FU-4 drift guard (internal/coverage) checks
# against the live registries on every CI run. A row whose status contradicts the
# code — a missing live capability, a phantom "shipped" entry, or a live
# capability marked "planned" — fails the `coverage-matrix` build.
#
# Categories parser / analyzer / mcp-tool / surface are machine-checked against
# registered parsers (core/parse), registered analyzers (engine/analysis),
# advertised MCP tools (surfaces/mcp.ToolNames), and present surfaces. Other
# categories (feature-unit) are informational traceability and are NOT live-checked.
#
# Edit this file, then run `go run ./cmd/coverage -generate` to refresh
# docs/coverage-matrix.md (a test asserts the .md equals the regenerated output).
#
# status: shipped | partial | planned
