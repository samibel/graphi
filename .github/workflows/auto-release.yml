# auto-release — tags a new version the moment it's safe to, so the one-line
# installer never 404s again just because a maintainer forgot to `git tag`.
#
# CHANGELOG.md is the single source of truth for "what version is next": cutting
# a release is editing CHANGELOG.md (moving entries out of [Unreleased] into a
# new "## [X.Y.Z] - date" section) and merging that to main — nothing else.
#
# This workflow runs after the `release` workflow (release.yml) finishes on
# main, and only proceeds if that run succeeded — so a version is never tagged
# from a commit that failed the build/test/layer-direction/install-script-drift
# gates. It then reads the newest "## [X.Y.Z]" header from CHANGELOG.md (skipping
# "## [Unreleased]") and, if no "vX.Y.Z" tag exists yet, creates and pushes one.
#
# Pushing that tag does NOT, by itself, trigger release.yml's tag-gated
# `release-assets` job: GitHub suppresses workflow runs that would otherwise be
# triggered by a push authenticated with the built-in GITHUB_TOKEN (an
# anti-recursion guard), and this job pushes using exactly that token. So after
# pushing the tag, this workflow explicitly dispatches release.yml instead of
# relying on the push event — an explicit workflow_dispatch API call IS
# allowed to use GITHUB_TOKEN. The dispatch targets `main` (not the tag: the
# tag's own commit may predate this workflow gaining the workflow_dispatch
# trigger, in which case GitHub has nothing to dispatch there) and passes the
# tag as the `tag` input, which release.yml's release-assets job uses in place
# of github.ref_name. The same `tag` input lets a maintainer manually re-run
# release-assets for any already-pushed, release-less tag.
#
# The dispatch step checks for an actual GitHub Release, not merely for the
# tag existing: a tag with no release (e.g. one created before this workflow
# gained its dispatch step, or a run where the dispatch itself failed) gets
# retried on every subsequent main push until the release actually appears,
# instead of being treated as "already handled" forever just because the tag
# is there. Fully idempotent otherwise: nothing runs at all once the latest
# CHANGELOG version has both its tag and its release.
#
# CT-01 (SW-109) — PUBLISH LOCK. Before doing any of the above, this job runs
# `go run ./cmd/publish-lock`, which reads the checked-in reversible gate file
# `.github/publish-lock.json`. While that gate is engaged (`"locked": true`),
# the tag-push and release-dispatch steps below are skipped entirely, so a merge
# to main can NEVER publish a release automatically — the only remaining path to
# a release is an intentional, human-initiated `workflow_dispatch` of release.yml.
# The gate fails CLOSED (a missing/broken gate file is treated as locked), so a
# deliberately-red gate yields no tag and no release. RC-01 lifts the lock with
# one documented change — flipping `"locked"` to false in the gate file — with no
# edit to this workflow.
name: auto-release

on:
  workflow_run:
    workflows: ["release"]
    types: [completed]

permissions:
  contents: write
  actions: write # needed to dispatch release.yml via `gh workflow run`

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  tag-if-needed:
    name: tag the latest CHANGELOG version if it isn't tagged yet
    if: >
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # CT-01 (SW-109): the publish lock. Emits `locked=true|false` and, while
      # locked, a "publish locked (CT-01)" notice. The tag-push and dispatch
      # steps below are gated on `locked != 'true'`, so nothing is published
      # while the gate is engaged. Fails closed on a missing/broken gate file.
      - name: check the publish lock (CT-01)
        id: lock
        run: go run ./cmd/publish-lock

      - name: read the newest released version from CHANGELOG.md
        id: ver
        run: |
          version=$(grep -m1 -E '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | sed -E 's/^## \[([0-9]+\.[0-9]+\.[0-9]+)\].*/\1/')
          if [ -z "$version" ]; then
            echo "::notice::no '## [X.Y.Z]' released-version header in CHANGELOG.md yet; nothing to tag"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: create and push the tag if it doesn't exist yet
        if: steps.ver.outputs.tag != '' && steps.lock.outputs.locked != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::notice::$TAG already exists"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG (auto-tagged from CHANGELOG.md)"
          git push origin "$TAG"
          echo "::notice::pushed $TAG"

      - name: dispatch release.yml if this tag has no release yet
        if: steps.ver.outputs.tag != '' && steps.lock.outputs.locked != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::$TAG already has a release; nothing to do"
            exit 0
          fi
          gh workflow run release.yml --ref main -f tag="$TAG"
          echo "::notice::dispatched release.yml for $TAG — its release-assets job cross-compiles and uploads to the GitHub Release"
