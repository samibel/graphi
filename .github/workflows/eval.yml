# SW-012 — Token-parity eval harness with CI-gated per-capability coverage matrix.
#
# Runs the frozen labeled eval set, measures graphi-vs-baseline token ratios with
# the deterministic offline tokenizer, emits a version-stamped report, enforces
# the per-capability coverage matrix + drift gate, and gates the public ~50x claim
# on the measured aggregate (resolving OQ4 with evidence). Hermetic. The distinct
# named check is "token-parity-eval".
name: eval

on:
  push:
    branches: [main]
  pull_request:

jobs:
  token-parity-eval:
    name: token-parity-eval
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: unit-tests (ratios, claim gate, coverage, drift, determinism)
        run: go test ./internal/eval/...

      - name: token-parity-eval + claim gate (named check)
        run: go run ./cmd/eval -claim-validate > eval-report.json

      - name: upload eval report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: eval-report
          path: eval-report.json

  # Tier-1 correctness regression gate; formerly its own workflow
  # (eval-correctness.yml). The job id and name are kept verbatim so
  # branch-protection required checks keep matching.
  eval-tier1-correctness:
    name: eval-tier1-correctness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Tier-1 eval
        id: eval
        run: |
          CGO_ENABLED=0 go run ./cmd/eval \
            -manifest corpus/manifest.json \
            -tier 1 \
            -out report.json \
            -format markdown
        env:
          CGO_ENABLED: 0

      - name: Upload eval report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: eval-report-tier1
          path: |
            report.json
            report.md

      - name: Fail on Tier-1 regression
        if: steps.eval.outcome == 'failure'
        run: exit 1
