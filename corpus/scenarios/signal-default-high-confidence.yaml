id: signal-default-high-confidence
description: >
  Default diagnose keeps the one true high-confidence dead symbol visible
  with its safe-delete action, and reports the reported outcome.
fixture_ref: synthetic-signal
area: signal
operation:
  name: diagnose
expect:
  outcome: reported
  anchors:
    - kind: symbol
      value: "diag dead_symbol sig/helper.go:5"
      match: contains
    - kind: symbol
      value: "sig/helper.go:5 confidence=exact suppression= occ=1 actions=safe_delete_symbol"
      match: contains
