# SW-055 AC#3/AC#7: strict all-green test gate.
#
# Runs the default suite under CGO_ENABLED=0 and accepts no expected failures.
# Permission-denial fixtures skip when the current filesystem does not enforce
# chmod mode bits; every emitted test, package, or build failure remains fatal.
name: test-gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-gate:
    name: test-gate (CGO_ENABLED=0)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      # Keep dependency-fetch diagnostics outside the strict go test JSON
      # producer. A download failure is still a hard workflow failure here.
      - name: download Go modules
        run: go mod download

      - name: stream-validator + drift-guard unit tests
        run: go test ./internal/testgate/...

      # Direct mode auto-discovers first-party Go packages, excludes npm's
      # node_modules dependency trees, and captures JSON, stderr, and exit status
      # together. A shell pipeline would expose only testgate's own exit status.
      - name: strict all-green gate (full suite)
        run: go run ./cmd/testgate
