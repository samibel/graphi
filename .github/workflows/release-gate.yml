name: release-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    env:
      GOAMD64: "v1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      # Keep dependency-fetch diagnostics outside testgate's strict go test
      # producer stream, matching the dedicated test-gate workflow.
      - name: Download Go modules
        run: go mod download

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Run release gate
        run: go run ./cmd/release-gate -publish

      - name: Assert published scorecard exists
        run: |
          test -f docs/release-scorecard.json
          test -f docs/release-scorecard.md
