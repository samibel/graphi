# SW-013 — Workspace CI, layer-direction guard, and reproducible release packaging.
#
# Three distinct, named checks:
#   workspace-build-test — build + test every module discovered from go.work use
#                          directives as a single gated job (new modules auto-included).
#   layer-direction      — enforce cmd → surfaces → engine → core, naming any
#                          upward/sideways import violation.
#   release              — produce the single static CGo-free, version/commit/date-
#                          stamped graphi binary and verify a reproducible (byte-
#                          identical) build.
name: release

on:
  push:
    branches: [main]
  pull_request:

jobs:
  workspace-build-test:
    name: workspace build + test (auto-discovered)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # ./... honors go.work's use directives, so new modules are auto-included.
      - name: build all modules
        run: go build ./...
      - name: test all modules
        run: go test ./...

  layer-direction:
    name: layer-direction guard (cmd→surfaces→engine→core)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: layer-direction check
        run: go run ./cmd/layerguard

  release:
    name: reproducible static release binary
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: reproducible release build (verify-only)
        run: go run ./cmd/release -version "${{ github.ref_name }}-${{ github.sha }}" -verify-only

      # SW-053 AC#3: the shipped default binary (cmd/release, subset-tagged via
      # internal/release.DefaultGrammarSubsetTags) MUST embed ONLY the registered
      # grammar blobs — never the all-206 default embed (+~24.5 MiB). cmd/release
      # builds subset-tagged by default; assert exactly the expected blob set is
      # linked in. Any extra grammar_blobs/*.bin fails the gate.
      - name: subset-tag default build embeds only registered grammars (AC#3)
        run: |
          go run ./cmd/release -version "${{ github.ref_name }}-${{ github.sha }}" -out ./graphi-default
          embedded=$(strings ./graphi-default | grep -oE 'grammar_blobs/[a-z_0-9]+\.bin' | sort -u)
          echo "embedded grammar blobs:"; echo "${embedded:-<none>}"
          expected="grammar_blobs/typescript.bin"
          if [ "$embedded" != "$expected" ]; then
            echo "::error::default build embeds an unexpected grammar blob set (AC#3 violation)"
            echo "  want: $expected"
            echo "  got:  ${embedded:-<none>}"
            exit 1
          fi
          rm -f ./graphi-default
