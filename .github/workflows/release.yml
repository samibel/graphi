# SW-013 — Workspace CI, layer-direction guard, and reproducible release packaging.
#
# Three distinct, named checks:
#   workspace-build-test — build + test every module discovered from go.work use
#                          directives as a single gated job (new modules auto-included).
#   layer-direction      — enforce cmd → surfaces → engine → core, naming any
#                          upward/sideways import violation.
#   release              — produce the single static CGo-free, version/commit/date-
#                          stamped graphi binary and verify a reproducible (byte-
#                          identical) build.
name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  # A tag pushed by auto-release.yml (which authenticates as the built-in
  # GITHUB_TOKEN) does NOT fire this workflow's own `tags: ['v*']` trigger —
  # GitHub suppresses downstream workflow runs caused by GITHUB_TOKEN-authored
  # pushes to prevent recursive triggering. workflow_dispatch is exempt from
  # that suppression, so auto-release.yml explicitly dispatches this workflow
  # (against `main`, passing the tag as an input) instead of relying on the
  # push event. The `tag` input also lets a maintainer manually re-run
  # release-assets for any already-pushed tag whose original push never
  # triggered a release, without needing to touch git tags at all.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build release assets for (e.g. v0.1.1)'
        required: true
        type: string

jobs:
  workspace-build-test:
    name: workspace build + test (auto-discovered)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # ./... honors go.work's use directives, so new modules are auto-included.
      - name: build all modules
        run: go build ./...
      - name: test all modules
        run: go test ./...

  layer-direction:
    name: layer-direction guard (cmd→surfaces→engine→core)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: layer-direction check
        run: go run ./cmd/layerguard

  release:
    name: reproducible static release binary
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: reproducible release build (verify-only)
        run: go run ./cmd/release -version "${{ github.ref_name }}-${{ github.sha }}" -verify-only

      # SW-053 AC#3: the shipped default binary (cmd/release, subset-tagged via
      # internal/release.DefaultGrammarSubsetTags) MUST embed ONLY the registered
      # grammar blobs — never the all-206 default embed (+~24.5 MiB). The expected
      # blob set is DERIVED from the source of truth (cmd/release -list-grammar-blobs
      # → release.ExpectedGrammarBlobs()), so adding a tier-1 language updates the
      # gate automatically and the assertion never drifts (SW-060 fix of a stale
      # single-grammar expectation left over from SW-053). Any extra OR missing
      # grammar_blobs/*.bin fails the gate.
      - name: subset-tag default build embeds exactly the registered grammars (AC#3)
        run: |
          go run ./cmd/release -version "${{ github.ref_name }}-${{ github.sha }}" -out ./graphi-default
          embedded=$(strings ./graphi-default | grep -oE 'grammar_blobs/[a-z_0-9]+\.bin' | sort -u)
          expected=$(go run ./cmd/release -list-grammar-blobs | sort -u)
          echo "expected grammar blobs (from DefaultGrammarSubsetTags):"; echo "$expected"
          echo "embedded grammar blobs:"; echo "${embedded:-<none>}"
          if [ "$embedded" != "$expected" ]; then
            echo "::error::default build embeds an unexpected grammar blob set (AC#3 violation)"
            diff <(echo "$expected") <(echo "${embedded:-<none>}") || true
            exit 1
          fi
          rm -f ./graphi-default

  # SW-065 (EP-010 Task B): the committed one-line installers (install.sh /
  # install.ps1) are GENERATED by cmd/gen-install from internal/release.ReleaseTargets
  # (single source of truth) + the embedded templates. This gate fails if either
  # committed file drifts from a fresh render (stale valid-asset list), and lints
  # install.sh with shellcheck. Runs on push/PR — NOT tag-gated.
  install-script-drift:
    name: install scripts in sync (gen-install -check + shellcheck)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: installers match the release source of truth
        run: go run ./cmd/gen-install -check
      # SW-071 (EP-010 Task H): the committed Homebrew formula + Scoop manifest
      # (packaging/homebrew/graphi.rb, packaging/scoop/graphi.json) are GENERATED
      # by cmd/gen-packaging from internal/release.ReleaseTargets (single source of
      # truth). `-check` re-renders the canonical placeholder structure and fails
      # if a committed manifest drifts from the release matrix.
      - name: packaging manifests match the release source of truth
        run: go run ./cmd/gen-packaging -check
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck install.sh
        run: shellcheck install.sh

  # SW-064 (EP-010 Task A): on a v* tag push, cross-compile the full
  # ReleaseTargets matrix, generate SHA256SUMS, and upload every asset to the
  # GitHub Release for that tag. Tag-only — never runs on branch/PR builds.
  release-assets:
    name: cross-compile release matrix + upload assets
    # Tag pushes satisfy the first clause directly. A workflow_dispatch run is
    # always dispatched against `main` (see auto-release.yml) with `inputs.tag`
    # naming the actual tag to build — github.ref there is refs/heads/main, not
    # a tag, so it needs its own clause rather than relying on github.ref.
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Build the actual tagged commit, not whatever `main` (the dispatch
          # target) has moved on to since.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: resolve the tag name for this run
        id: tag
        run: echo "name=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      # Released binaries embed the web UI (-tags webui_embed) so the quick-start
      # promise — "your browser opens with the interactive code graph" — is true
      # for the binaries users actually install. Without this, released binaries
      # served the "UI not bundled" notice page at "/".
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: build web UI for embedding
        run: |
          (cd web && npm ci && npm run build)
          rm -rf surfaces/http/webui/dist
          cp -R web/dist surfaces/http/webui/dist
      - name: cross-compile matrix + SHA256SUMS (web UI embedded)
        run: go run ./cmd/release -dist dist -webui -version "${{ steps.tag.outputs.name }}"
      - name: upload assets to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # Ensure the Release exists for this tag (a bare tag push does not create
        # one), then upload every matrix asset + SHA256SUMS, replacing same-named
        # assets on re-runs (--clobber → idempotent).
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --title "$TAG" --generate-notes
          gh release upload "$TAG" dist/* --clobber
      # Publish the Homebrew formula and Scoop manifest to the tap/bucket repos
      # (samibel/homebrew-graphi → Formula/graphi.rb, samibel/scoop-graphi →
      # bucket/graphi.json), rendered from the REAL SHA256SUMS of this release.
      # Gated on the PACKAGING_PUSH_TOKEN secret — a fine-grained PAT with
      # contents:write on ONLY those two repos. Until the maintainer creates
      # the repos and adds the secret, this step logs and skips cleanly so the
      # release stays green; once the token exists, a missing/unwritable repo
      # is a hard failure (a half-configured pipeline must be visible, and the
      # job is idempotent to re-run). The committed packaging/ placeholders
      # (version 0.0.0) are never pushed anywhere and stay untouched in git —
      # the release render happens only in this job's workspace.
      - name: publish Homebrew tap + Scoop bucket
        env:
          PACKAGING_PUSH_TOKEN: ${{ secrets.PACKAGING_PUSH_TOKEN }}
        run: |
          if [ -z "$PACKAGING_PUSH_TOKEN" ]; then
            echo "PACKAGING_PUSH_TOKEN not configured — skipping tap/bucket publish."
            echo "To enable: create samibel/homebrew-graphi and samibel/scoop-graphi, then add a fine-grained PAT (contents:write, only those two repos) as the PACKAGING_PUSH_TOKEN secret."
            exit 0
          fi
          TAG="${{ steps.tag.outputs.name }}"
          go run ./cmd/gen-packaging -version "$TAG" -sums dist/SHA256SUMS
          publish() {
            repo="$1"; src="$2"; dest="$3"
            dir="$(mktemp -d)"
            git clone --depth 1 "https://x-access-token:${PACKAGING_PUSH_TOKEN}@github.com/${repo}.git" "$dir"
            mkdir -p "$dir/$(dirname "$dest")"
            cp "$src" "$dir/$dest"
            git -C "$dir" config user.name "github-actions[bot]"
            git -C "$dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git -C "$dir" add "$dest"
            if git -C "$dir" diff --cached --quiet; then
              echo "${repo}: ${dest} already up to date for ${TAG}"
            else
              git -C "$dir" commit -m "graphi ${TAG}"
              git -C "$dir" push origin HEAD
            fi
          }
          publish "samibel/homebrew-graphi" packaging/homebrew/graphi.rb Formula/graphi.rb
          publish "samibel/scoop-graphi" packaging/scoop/graphi.json bucket/graphi.json
          git checkout -- packaging/
