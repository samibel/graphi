id: signal-external-imports-aggregated
description: >
  Repeated unresolved references to the same external target collapse to a
  single diagnostic carrying an occurrence count and merged evidence. WP-12
  performs this aggregation in the analyzer (one finding per target), so no
  per-edge duplicates reach the output even under --all.
fixture_ref: synthetic-signal
area: signal
operation:
  name: diagnose
  args:
    all: "true"
expect:
  outcome: reported
  anchors:
    - kind: symbol
      value: "diag unresolved_reference"
      match: contains
    - kind: symbol
      value: "occ=2"
      match: contains
    - kind: symbol
      value: "suppression= occ=2"
      match: contains
