# SW-011 — Savings-ledger audit, recompute & anti-gaming conformance suite.
#
# A single gating job that runs the independent savings-ledger audit hermetically
# against the pinned frozen workload + embedded local price table, and fails on
# any recompute / cap / integrity / locality violation. The distinct named check
# is "savings-ledger-audit".
name: ledgeraudit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  savings-ledger-audit:
    name: savings-ledger-audit
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: unit-tests (recompute, cap, integrity, locality)
        run: go test ./internal/ledgeraudit/...

      - name: savings-ledger-audit (named check)
        run: go run ./cmd/ledgeraudit > ledgeraudit-report.json

      - name: upload audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ledgeraudit-report
          path: ledgeraudit-report.json
